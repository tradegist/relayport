[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ibkr-relay-types"
version = "0.2.0"
description = "Pydantic types for IBKR Webhook Relay — webhook payloads and poller API"
requires-python = ">=3.11"
dependencies = ["pydantic>=2.0,<3"]
license = {text = "MIT"}

[tool.setuptools.packages.find]
where = ["."]
include = ["ibkr_relay_types"]
