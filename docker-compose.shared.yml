# Shared-mode overrides: disables Caddy (the host project runs it).
#
# The shared Docker network is declared in docker-compose.shared-network.yml,
# which the CLI applies whenever SHARED_NETWORK is set. Both overlays are
# typically applied together in shared mode.
#
# Usage:
#   docker compose -f docker-compose.yml \
#                  -f docker-compose.shared.yml \
#                  -f docker-compose.shared-network.yml up -d

services:
  caddy:
    profiles: ["disabled"]
