# Local development overrides — no TLS, direct port access.
# Bind mounts shadow the baked-in COPY so code changes are visible on restart.
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d

services:
  relays:
    ports:
      - "15001:8000"
    volumes:
      - ./services/relay_core:/app/relay_core:ro
      - ./services/relays:/app/relays:ro
      - ./services/poller/poller:/app/poller:ro
      - ./services/notifier:/app/notifier:ro
      - ./services/dedup:/app/dedup:ro
      - ./services/shared:/app/shared:ro

  debug:
    ports:
      - "15003:9000"
    volumes:
      - ./services/debug/debug_app.py:/app/debug_app.py:ro

  caddy:
    profiles: ["disabled"]

networks:
  default:
    name: broker-relay-local
