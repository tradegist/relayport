# E2E test overrides — applied on top of docker-compose.yml.
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml ...
# See Makefile E2E_COMPOSE for the full invocation.

services:
  ib-gateway:
    restart: "no"

  remote-client:
    restart: "no"
    environment:
      API_TOKEN: test-token
      LISTENER_ENABLED: "true"
      LISTENER_EVENT_DEBOUNCE_TIME: "2000"
      NOTIFIERS: webhook
      TARGET_WEBHOOK_URL: http://host.docker.internal:19999/webhook
      WEBHOOK_SECRET: test-webhook-secret
      PYTHONPATH: /opt:/opt/poller-models
    ports:
      - "15010:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./services/remote-client:/app
      - ./services/notifier:/opt/notifier
      - ./services/dedup:/opt/dedup
      - ./services/shared:/opt/shared
      - ./services/poller/models_poller.py:/opt/poller-models/models_poller.py:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')",
        ]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s

  poller:
    restart: "no"
    environment:
      IBKR_FLEX_TOKEN: test-flex-token
      IBKR_FLEX_QUERY_ID: "000000"
      API_TOKEN: test-token
      POLLER_API_PORT: "8000"
      PYTHONPATH: /opt
    ports:
      - "15011:8000"
    volumes:
      - ./services/poller:/app
      - ./services/notifier:/opt/notifier
      - ./services/dedup:/opt/dedup
      - ./services/shared:/opt/shared
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s

  # Disable production-only services
  novnc:
    profiles: ["disabled"]
  caddy:
    profiles: ["disabled"]
  gateway-controller:
    profiles: ["disabled"]
