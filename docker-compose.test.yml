# E2E test stack — paper account, no TLS, no VNC.
# Usage: make e2e
# Env file: .env.test

name: ibkr-relay-test

services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    restart: "no"
    environment:
      TWS_USERID: ${TWS_TEST_USER:?Set TWS_TEST_USER in .env}
      TWS_PASSWORD: ${TWS_TEST_PASSWORD:?Set TWS_TEST_PASSWORD in .env}
      TRADING_MODE: paper
      TWOFA_TIMEOUT_ACTION: exit
      RELOGIN_AFTER_TWOFA_TIMEOUT: "no"
      EXISTING_SESSION_DETECTED_ACTION: primary
      READ_ONLY_API: "no"
      TZ: ${TIME_ZONE:-America/New_York}
    expose:
      - "4004"

  webhook-relay:
    build: ./remote-client
    restart: "no"
    depends_on:
      - ib-gateway
    environment:
      IB_HOST: ib-gateway
      IB_PAPER_PORT: "4004"
      TRADING_MODE: paper
      API_TOKEN: test-token
    ports:
      - "15000:5000"
    volumes:
      - ./remote-client:/app
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')",
        ]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 10s

  poller:
    build:
      context: .
      dockerfile: poller/Dockerfile
    restart: "no"
    environment:
      IBKR_FLEX_TOKEN: test-flex-token
      IBKR_FLEX_QUERY_ID: "000000"
      API_TOKEN: test-token
      POLLER_API_PORT: "8000"
    ports:
      - "15001:8000"
    volumes:
      - ./poller:/app
      - poller-test-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  poller-test-data:
