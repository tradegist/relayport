# E2E test overrides — applied on top of docker-compose.yml.
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml ...
# See Makefile E2E_COMPOSE for the full invocation.

services:
  relays:
    restart: "no"
    environment:
      RELAYS: ibkr
      IBKR_FLEX_TOKEN: test-flex-token
      IBKR_FLEX_QUERY_ID: "000000"
      API_TOKEN: test-token
      API_PORT: "8000"
      DEBUG_WEBHOOK_PATH: test-debug-path
      NOTIFIERS: webhook
      WEBHOOK_SECRET: test-webhook-secret
      LISTENER_ENABLED: "${LISTENER_ENABLED:-false}"
      BRIDGE_WS_URL: "${BRIDGE_WS_URL:-}"
      BRIDGE_API_TOKEN: "${BRIDGE_API_TOKEN:-}"
    ports:
      - "15011:8000"
    volumes:
      - ./services/relay_core:/app/relay_core
      - ./services/relays:/app/relays
      - ./services/poller/poller:/app/poller
      - ./services/notifier:/app/notifier
      - ./services/dedup:/app/dedup
      - ./services/shared:/app/shared
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 5s

  debug:
    restart: "no"
    deploy:
      replicas: 1
    environment:
      DEBUG_WEBHOOK_PATH: test-debug-path
    ports:
      - "15012:9000"
    volumes:
      - ./services/debug:/app
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')",
        ]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 3s

  # Disable production-only services
  caddy:
    profiles: ["disabled"]

networks:
  default:
    name: broker-relay-test
