name: ibkr-relay

services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    restart: on-failure
    deploy:
      replicas: ${GATEWAY_REPLICAS:-1}
    environment:
      TWS_USERID: ${TWS_USERID:-}
      TWS_PASSWORD: ${TWS_PASSWORD:-}
      TRADING_MODE: ${TRADING_MODE:-paper}
      VNC_SERVER_PASSWORD: ${VNC_SERVER_PASSWORD:-}
      TWOFA_TIMEOUT_ACTION: exit
      RELOGIN_AFTER_TWOFA_TIMEOUT: "no"
      EXISTING_SESSION_DETECTED_ACTION: primary
      READ_ONLY_API: "no"
      JAVA_HEAP_SIZE: ${JAVA_HEAP_SIZE:-}
      TZ: ${TIME_ZONE:-America/New_York}
    expose:
      - "4003"
      - "4004"
      - "5900"

  novnc:
    image: theasp/novnc:latest
    restart: always
    deploy:
      replicas: ${GATEWAY_REPLICAS:-1}
    depends_on:
      - ib-gateway
    environment:
      DISPLAY_WIDTH: 1024
      DISPLAY_HEIGHT: 768
      RUN_XTERM: "no"
    expose:
      - "8080"
    volumes:
      - ./infra/novnc/index.html:/usr/share/novnc/index.html:ro
    entrypoint:
      ["websockify", "--web", "/usr/share/novnc", "8080", "ib-gateway:5900"]

  caddy:
    image: caddy:2-alpine
    restart: always
    depends_on:
      - novnc
    ports:
      - "80:80"
      - "443:443"
    environment:
      VNC_DOMAIN: ${VNC_DOMAIN:?Set VNC_DOMAIN in .env}
      SITE_DOMAIN: ${SITE_DOMAIN:?Set SITE_DOMAIN in .env}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/caddy/sites/:/etc/caddy/sites/:ro
      - ./infra/caddy/domains/:/etc/caddy/domains/:ro
      - /opt/caddy-shared/sites/:/etc/caddy/shared-sites/:ro
      - /opt/caddy-shared/domains/:/etc/caddy/shared-domains/:ro
      - caddy-data:/data
      - caddy-config:/config

  remote-client:
    build:
      context: .
      dockerfile: services/remote-client/Dockerfile
    restart: always
    deploy:
      replicas: ${GATEWAY_REPLICAS:-1}
    depends_on:
      - ib-gateway
    environment:
      IB_HOST: ib-gateway
      IB_LIVE_PORT: "4003"
      IB_PAPER_PORT: "4004"
      TRADING_MODE: ${TRADING_MODE:-paper}
      API_TOKEN: ${API_TOKEN:?Set API_TOKEN in .env}
      LISTENER_ENABLED: ${LISTENER_ENABLED:-}
      LISTENER_EVENT_DEBOUNCE_TIME: ${LISTENER_EVENT_DEBOUNCE_TIME:-0}
      NOTIFIERS: ${NOTIFIERS:-}
      TARGET_WEBHOOK_URL: ${TARGET_WEBHOOK_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      WEBHOOK_HEADER_NAME: ${WEBHOOK_HEADER_NAME:-}
      WEBHOOK_HEADER_VALUE: ${WEBHOOK_HEADER_VALUE:-}
      DEDUP_DB_PATH: /data/dedup/fills.db
    expose:
      - "5000"
    volumes:
      - dedup-data:/data/dedup

  poller:
    build:
      context: .
      dockerfile: services/poller/Dockerfile
    restart: always
    deploy:
      replicas: ${POLLER_REPLICAS:-1}
    environment:
      IBKR_FLEX_TOKEN: ${IBKR_FLEX_TOKEN:?Set IBKR_FLEX_TOKEN in .env}
      IBKR_FLEX_QUERY_ID: ${IBKR_FLEX_QUERY_ID:?Set IBKR_FLEX_QUERY_ID in .env}
      NOTIFIERS: ${NOTIFIERS:-}
      TARGET_WEBHOOK_URL: ${TARGET_WEBHOOK_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      WEBHOOK_HEADER_NAME: ${WEBHOOK_HEADER_NAME:-}
      WEBHOOK_HEADER_VALUE: ${WEBHOOK_HEADER_VALUE:-}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-600}
      API_TOKEN: ${API_TOKEN:?Set API_TOKEN in .env}
      DEDUP_DB_PATH: /data/dedup/fills.db
      META_DB_PATH: /data/meta/poller.db
    expose:
      - "8000"
    volumes:
      - dedup-data:/data/dedup
      - poller-data:/data/meta

  poller-2:
    build:
      context: .
      dockerfile: services/poller/Dockerfile
    restart: always
    profiles: ["poller2"]
    deploy:
      replicas: ${POLLER_REPLICAS:-1}
    environment:
      IBKR_FLEX_TOKEN: ${IBKR_FLEX_TOKEN_2:-}
      IBKR_FLEX_QUERY_ID: ${IBKR_FLEX_QUERY_ID_2:-}
      NOTIFIERS: ${NOTIFIERS_2:-}
      TARGET_WEBHOOK_URL: ${TARGET_WEBHOOK_URL_2:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET_2:-}
      WEBHOOK_HEADER_NAME: ${WEBHOOK_HEADER_NAME_2:-}
      WEBHOOK_HEADER_VALUE: ${WEBHOOK_HEADER_VALUE_2:-}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS_2:-600}
      API_TOKEN: ${API_TOKEN:?Set API_TOKEN in .env}
      DEDUP_DB_PATH: /data/dedup/fills.db
      META_DB_PATH: /data/meta/poller-2.db
    expose:
      - "8000"
    volumes:
      - dedup-data:/data/dedup
      - poller-2-data:/data/meta

  gateway-controller:
    build: ./infra/gateway-controller
    restart: always
    deploy:
      replicas: ${GATEWAY_REPLICAS:-1}
    environment:
      COMPOSE_PROJECT_NAME: ibkr-relay
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "9000"

volumes:
  dedup-data:
  poller-data:
  poller-2-data:
  caddy-data:
  caddy-config:

networks:
  default:
    name: relay-net
