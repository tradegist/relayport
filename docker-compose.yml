name: ibkr-relay

services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    restart: on-failure
    environment:
      TWS_USERID: ${TWS_USERID:?Set TWS_USERID in .env}
      TWS_PASSWORD: ${TWS_PASSWORD:?Set TWS_PASSWORD in .env}
      TRADING_MODE: ${TRADING_MODE:-paper}
      VNC_SERVER_PASSWORD: ${VNC_SERVER_PASSWORD:?Set VNC_SERVER_PASSWORD in .env}
      TWOFA_TIMEOUT_ACTION: exit
      RELOGIN_AFTER_TWOFA_TIMEOUT: "no"
      EXISTING_SESSION_DETECTED_ACTION: primary
      READ_ONLY_API: "no"
      JAVA_HEAP_SIZE: ${JAVA_HEAP_SIZE:-}
      TZ: ${TIME_ZONE:-America/New_York}
    expose:
      - "4003"
      - "4004"
      - "5900"

  novnc:
    image: theasp/novnc:latest
    restart: always
    depends_on:
      - ib-gateway
    environment:
      DISPLAY_WIDTH: 1024
      DISPLAY_HEIGHT: 768
      RUN_XTERM: "no"
    expose:
      - "8080"
    volumes:
      - ./novnc/index.html:/usr/share/novnc/index.html:ro
    entrypoint:
      ["websockify", "--web", "/usr/share/novnc", "8080", "ib-gateway:5900"]

  caddy:
    image: caddy:2-alpine
    restart: always
    depends_on:
      - novnc
    ports:
      - "80:80"
      - "443:443"
    environment:
      VNC_DOMAIN: ${VNC_DOMAIN:?Set VNC_DOMAIN in .env}
      TRADE_DOMAIN: ${TRADE_DOMAIN:?Set TRADE_DOMAIN in .env}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  webhook-relay:
    build: ./remote-client
    restart: always
    depends_on:
      - ib-gateway
    environment:
      IB_HOST: ib-gateway
      IB_LIVE_PORT: "4003"
      IB_PAPER_PORT: "4004"
      TRADING_MODE: ${TRADING_MODE:-paper}
      API_TOKEN: ${API_TOKEN:?Set API_TOKEN in .env}
    expose:
      - "5000"

  poller:
    build:
      context: .
      dockerfile: poller/Dockerfile
    restart: always
    environment:
      IBKR_FLEX_TOKEN: ${IBKR_FLEX_TOKEN:?Set IBKR_FLEX_TOKEN in .env}
      IBKR_FLEX_QUERY_ID: ${IBKR_FLEX_QUERY_ID:?Set IBKR_FLEX_QUERY_ID in .env}
      TARGET_WEBHOOK_URL: ${TARGET_WEBHOOK_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:?Set WEBHOOK_SECRET in .env}
      WEBHOOK_HEADER_NAME: ${WEBHOOK_HEADER_NAME:-}
      WEBHOOK_HEADER_VALUE: ${WEBHOOK_HEADER_VALUE:-}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-600}
      API_TOKEN: ${API_TOKEN:?Set API_TOKEN in .env}
    expose:
      - "8000"
    volumes:
      - poller-data:/data

  poller-2:
    build:
      context: .
      dockerfile: poller/Dockerfile
    restart: always
    profiles: ["poller2"]
    environment:
      IBKR_FLEX_TOKEN: ${IBKR_FLEX_TOKEN_2:?Set IBKR_FLEX_TOKEN_2 in .env}
      IBKR_FLEX_QUERY_ID: ${IBKR_FLEX_QUERY_ID_2:?Set IBKR_FLEX_QUERY_ID_2 in .env}
      TARGET_WEBHOOK_URL: ${TARGET_WEBHOOK_URL_2:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET_2:?Set WEBHOOK_SECRET_2 in .env}
      WEBHOOK_HEADER_NAME: ${WEBHOOK_HEADER_NAME_2:-}
      WEBHOOK_HEADER_VALUE: ${WEBHOOK_HEADER_VALUE_2:-}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS_2:-600}
      API_TOKEN: ${API_TOKEN:?Set API_TOKEN in .env}
      DB_PATH: /data/poller.db
    expose:
      - "8000"
    volumes:
      - poller-2-data:/data

  gateway-controller:
    build: ./gateway-controller
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "9000"

volumes:
  poller-data:
  poller-2-data:
  caddy-data:
  caddy-config:
