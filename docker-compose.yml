name: broker-relay

services:
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:?Set SITE_DOMAIN in .env}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/caddy/sites/:/etc/caddy/sites/:ro
      - /opt/caddy-shared/sites/:/etc/caddy/shared-sites/:ro
      - /opt/caddy-shared/domains/:/etc/caddy/shared-domains/:ro
      - caddy-data:/data
      - caddy-config:/config

  relays:
    build:
      context: .
      dockerfile: services/relay_core/Dockerfile
    restart: always
    environment:
      RELAYS: ${RELAYS:-}
      API_TOKEN: ${API_TOKEN:?Set API_TOKEN in .env}
      # Generic (relay-agnostic) env vars — adapters use {RELAY}_VAR overrides
      NOTIFIERS: ${NOTIFIERS:-}
      TARGET_WEBHOOK_URL: ${TARGET_WEBHOOK_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      WEBHOOK_HEADER_NAME: ${WEBHOOK_HEADER_NAME:-}
      WEBHOOK_HEADER_VALUE: ${WEBHOOK_HEADER_VALUE:-}
      DEBUG_WEBHOOK_PATH: ${DEBUG_WEBHOOK_PATH:-}
      POLL_INTERVAL: ${POLL_INTERVAL:-600}
      LISTENER_ENABLED: ${LISTENER_ENABLED:-}
      LISTENER_DEBOUNCE_MS: ${LISTENER_DEBOUNCE_MS:-0}
      # IBKR-specific env vars
      IBKR_FLEX_TOKEN: ${IBKR_FLEX_TOKEN:-}
      IBKR_FLEX_QUERY_ID: ${IBKR_FLEX_QUERY_ID:-}
      IBKR_FLEX_TOKEN_2: ${IBKR_FLEX_TOKEN_2:-}
      IBKR_FLEX_QUERY_ID_2: ${IBKR_FLEX_QUERY_ID_2:-}
      IBKR_NOTIFIERS: ${IBKR_NOTIFIERS:-}
      IBKR_TARGET_WEBHOOK_URL: ${IBKR_TARGET_WEBHOOK_URL:-}
      IBKR_WEBHOOK_SECRET: ${IBKR_WEBHOOK_SECRET:-}
      IBKR_WEBHOOK_HEADER_NAME: ${IBKR_WEBHOOK_HEADER_NAME:-}
      IBKR_WEBHOOK_HEADER_VALUE: ${IBKR_WEBHOOK_HEADER_VALUE:-}
      IBKR_TARGET_WEBHOOK_URL_2: ${IBKR_TARGET_WEBHOOK_URL_2:-}
      IBKR_WEBHOOK_SECRET_2: ${IBKR_WEBHOOK_SECRET_2:-}
      IBKR_WEBHOOK_HEADER_NAME_2: ${IBKR_WEBHOOK_HEADER_NAME_2:-}
      IBKR_WEBHOOK_HEADER_VALUE_2: ${IBKR_WEBHOOK_HEADER_VALUE_2:-}
      IBKR_POLL_INTERVAL: ${IBKR_POLL_INTERVAL:-}
      IBKR_LISTENER_ENABLED: ${IBKR_LISTENER_ENABLED:-}
      IBKR_LISTENER_DEBOUNCE_MS: ${IBKR_LISTENER_DEBOUNCE_MS:-}
      BRIDGE_WS_URL: ${BRIDGE_WS_URL:-}
      BRIDGE_API_TOKEN: ${BRIDGE_API_TOKEN:-}
      LISTENER_EXEC_EVENTS_ENABLED: ${LISTENER_EXEC_EVENTS_ENABLED:-false}
    expose:
      - "8000"
    volumes:
      - dedup-data:/data/dedup
      - relay-meta:/data/meta

  debug:
    build:
      context: .
      dockerfile: services/debug/Dockerfile
    restart: always
    deploy:
      replicas: ${DEBUG_REPLICAS:-0}
    logging:
      options:
        max-size: "10k"
        max-file: "1"
    environment:
      DEBUG_WEBHOOK_PATH: ${DEBUG_WEBHOOK_PATH:-}
      MAX_DEBUG_WEBHOOK_PAYLOADS: ${MAX_DEBUG_WEBHOOK_PAYLOADS:-100}
      LOG_LEVEL: ${DEBUG_LOG_LEVEL:-INFO}
    expose:
      - "9000"

volumes:
  dedup-data:
  relay-meta:
  caddy-data:
  caddy-config:

networks:
  default:
    name: ${SHARED_NETWORK:-}
