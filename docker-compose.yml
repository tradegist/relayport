name: relayport

services:
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:?Set SITE_DOMAIN in .env}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./infra/caddy/sites/:/etc/caddy/sites/:ro
      - /opt/caddy-shared/sites/:/etc/caddy/shared-sites/:ro
      - /opt/caddy-shared/domains/:/etc/caddy/shared-domains/:ro
      - caddy-data:/data
      - caddy-config:/config

  relays:
    build:
      context: .
      dockerfile: services/relay_core/Dockerfile
    restart: always
    env_file:
      - .env
      - path: .env.relays
        required: false
    environment:
      # Required (compose fail-fast guard)
      API_TOKEN: ${API_TOKEN:?Set API_TOKEN in .env}
      # Defaults (override in .env / .env.relays)
      POLL_INTERVAL: ${POLL_INTERVAL:-600}
      LISTENER_DEBOUNCE_MS: ${LISTENER_DEBOUNCE_MS:-0}
      LISTENER_EXEC_EVENTS_ENABLED: ${LISTENER_EXEC_EVENTS_ENABLED:-false}
      NOTIFY_RETRIES: ${NOTIFY_RETRIES:-0}
      NOTIFY_RETRY_DELAY_MS: ${NOTIFY_RETRY_DELAY_MS:-1000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    expose:
      - "8000"
    volumes:
      - dedup-data:/data/dedup
      - relay-meta:/data/meta

  debug:
    build:
      context: .
      dockerfile: services/debug/Dockerfile
    restart: always
    deploy:
      replicas: ${DEBUG_REPLICAS:-0}
    logging:
      options:
        max-size: "10k"
        max-file: "1"
    environment:
      DEBUG_WEBHOOK_PATH: ${DEBUG_WEBHOOK_PATH:-}
      MAX_DEBUG_WEBHOOK_PAYLOADS: ${MAX_DEBUG_WEBHOOK_PAYLOADS:-100}
      LOG_LEVEL: ${DEBUG_LOG_LEVEL:-INFO}
    expose:
      - "9000"

volumes:
  dedup-data:
  relay-meta:
  caddy-data:
  caddy-config:

networks:
  default:
    name: ${SHARED_NETWORK:-}
