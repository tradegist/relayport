name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: make deps PYTHON=python3 PIP=pip

      - name: Verify generated types are in sync with source
        run: |
          make types PYTHON=python3
          if ! git diff --quiet; then
            echo "::error::Generated types are out of sync with the Pydantic source. Run 'make types' locally and commit the result."
            git --no-pager diff
            exit 1
          fi

      - name: Run linter
        run: make lint PYTHON=python3

      - name: Run type checking
        run: make typecheck PYTHON=python3

      - name: Run unit tests
        run: make test PYTHON=python3
